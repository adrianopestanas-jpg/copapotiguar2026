server {
  listen 80;
  server_name copa2026.apotiguar.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name copa2026.apotiguar.com.br;

  root /usr/share/nginx/html;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/copa2026.apotiguar.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/copa2026.apotiguar.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /index.html =404;
  }

  location = /app.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /app.js =404;
  }

  location = /participants-data.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /participants-data.js =404;
  }

  location = /styles.css {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /styles.css =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ^~ /vendor/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
