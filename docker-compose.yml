services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - copa-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-copa_admin}:${POSTGRES_PASSWORD:?configure POSTGRES_PASSWORD no arquivo .env}@db:5432/${POSTGRES_DB:-copa_potiguar}
      TZ: America/Fortaleza
    depends_on:
      db:
        condition: service_healthy
    networks:
      - copa-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-copa_potiguar}
      POSTGRES_USER: ${POSTGRES_USER:-copa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?configure POSTGRES_PASSWORD no arquivo .env}
      TZ: America/Fortaleza
    volumes:
      - copa-db-data:/var/lib/postgresql/data
      - ./supabase-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-copa_admin} -d ${POSTGRES_DB:-copa_potiguar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - copa-network

volumes:
  copa-db-data:

networks:
  copa-network:
    driver: bridge
